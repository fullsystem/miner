services:
  miner:
    image: ghcr.io/fullsystem/miner:latest
    build: .
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      # Your BTC wallet — the only required variable
      WALLET: ${WALLET:?Set WALLET in .env}
      # Percentage of CPU cores used by the miner (1-100)
      POWER: ${POWER:-50}
      # Worker name shown at the pool (useful with multiple instances)
      WORKER_NAME: ${WORKER_NAME:-docker}
      # Dashboard password; without it the panel is public read-only
      # DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    # Hard CPU cap for the whole container, on top of POWER — plays nice
    # with other projects on the same box:
    # cpus: "2.0"
