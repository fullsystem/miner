name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional auto-deploy: set the DOKPLOY_WEBHOOK_URL repo secret to the
      # service's webhook (Dokploy → service → Deployments) and every image
      # push to main redeploys it automatically. Skipped when unset.
      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS -X POST "$WEBHOOK" && echo "redeploy triggered"
          else
            echo "DOKPLOY_WEBHOOK_URL not set — skipping"
          fi
