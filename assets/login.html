<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>miner — access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0806; --panel: #120e08; --line: #2b2014;
  --amber: #ffb200; --amber-dim: #a8752a; --red: #ff4d3a; --text: #e8d5b0;
  --glow: 0 0 6px rgba(255,178,0,.55), 0 0 24px rgba(255,178,0,.18);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  background:
    radial-gradient(900px 500px at 50% -20%, rgba(247,147,26,.07), transparent 60%),
    var(--bg);
  color: var(--text);
  min-height: 100vh; display: grid; place-items: center; padding: 20px;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
}
.box {
  width: min(360px, 92vw);
  background: var(--panel); border: 1px solid var(--line);
  padding: 34px 30px 30px; position: relative;
  animation: rise .5s ease both;
}
.box::before {
  content: "restricted"; position: absolute; top: -8px; left: 12px;
  background: var(--bg); padding: 0 8px;
  font-size: 10px; letter-spacing: 3px; color: var(--amber-dim); text-transform: uppercase;
}
.logo {
  font-family: "Martian Mono", monospace; font-weight: 800; font-size: 20px;
  color: var(--amber); text-shadow: var(--glow); letter-spacing: -1px; margin-bottom: 6px;
}
.logo .path { color: var(--amber-dim); font-weight: 400; }
.hint { font-size: 11px; color: var(--amber-dim); margin-bottom: 24px; }
label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--amber-dim); margin-bottom: 8px; }
input {
  width: 100%; background: var(--bg); border: 1px solid var(--line);
  color: var(--amber); font: 600 16px "IBM Plex Mono", monospace;
  padding: 12px 14px; outline: none; letter-spacing: 2px;
}
input:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 1px var(--amber-dim); }
button {
  width: 100%; margin-top: 14px; padding: 12px;
  background: var(--amber); color: #14100a; border: none; cursor: pointer;
  font: 800 12px "Martian Mono", monospace; letter-spacing: 3px; text-transform: uppercase;
}
button:hover { box-shadow: var(--glow); }
button:disabled { opacity: .6; cursor: wait; }
.err {
  margin-top: 14px; font-size: 11px; color: var(--red); min-height: 14px;
  letter-spacing: 1px; text-transform: uppercase;
}
.shake { animation: shake .35s ease; }
@keyframes shake { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } }
</style>
</head>
<body>
<form class="box" id="box">
  <div class="logo"><span class="path">fullsystem://</span>miner</div>
  <div class="hint">operator access required</div>
  <label for="pw">password</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus>
  <button id="go" type="submit">unlock</button>
  <div class="err" id="err"></div>
</form>
<script>
const box = document.getElementById("box");
box.addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("go"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: document.getElementById("pw").value }),
    });
    if (r.ok) { location.reload(); return; }
    err.textContent = "access denied";
  } catch {
    err.textContent = "connection error";
  }
  btn.disabled = false;
  box.classList.remove("shake"); void box.offsetWidth; box.classList.add("shake");
});
</script>
</body>
</html>
